services:
  - type: web
    name: coldcache-backend
    runtime: python
    # Free plan is stateless — Render only attaches persistent disks to paid
    # plans, so there's no disk block here. Case data (SQLite + files under
    # COLDCACHE_DATA_DIR) lives on the container's local ephemeral disk and
    # resets whenever the free instance restarts or spins down from
    # inactivity. Fine for a demo; add a `disk:` block back and switch plan
    # to "starter" if you need durability across restarts.
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.production.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # --- LLM (Groq) — set these in the Render dashboard, never commit real values ---
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_MODEL
        value: groq/llama-3.1-8b-instant
      - key: LLM_ENDPOINT
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false          # set manually in Render dashboard (secret)
      - key: LLM_INSTRUCTOR_MODE
        value: tool_call
      - key: COGNEE_SKIP_CONNECTION_TEST
        value: "true"
      - key: LLM_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: LLM_TRANSCRIPTION_MODEL
        value: whisper-large-v3
      # --- Local embeddings, no key needed ---
      - key: EMBEDDING_PROVIDER
        value: fastembed
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      # --- App/Cognee data directories: on the free plan these live on ephemeral
      # local disk (reset on restart/sleep); with a paid plan + disk block
      # mounted at /opt/render/project/cognee_data, they'd persist instead. ---
      - key: DATA_ROOT_DIRECTORY
        value: /opt/render/project/cognee_data/data_storage
      - key: SYSTEM_ROOT_DIRECTORY
        value: /opt/render/project/cognee_data/cognee_system
      - key: CACHE_ROOT_DIRECTORY
        value: /opt/render/project/cognee_data/cognee_cache
      - key: COLDCACHE_DATA_DIR
        value: /opt/render/project/cognee_data/app
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: REQUIRE_LIVE_LLM
        value: "true"
      # --- Public-deployment hardening (see .env.example for details) ---
      - key: ADMIN_TOKEN
        sync: false          # set to a long random string; protects GET /cases and POST /expunge
      - key: RATE_LIMIT_MAX_PER_MINUTE
        value: "20"

